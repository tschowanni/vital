<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d3445"/>
      <stop offset="100%" stop-color="#1a1d24"/>
    </linearGradient>
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7aa0ff"/>
      <stop offset="100%" stop-color="#5b8cff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- App-Icon Hintergrund: abgerundetes Quadrat mit Nordic-Dark-Gradient -->
  <rect width="512" height="512" rx="110" fill="url(#bgGrad)"/>

  <!-- Subtiler Akzent-Ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#5b8cff" stroke-width="2" opacity="0.08"/>
  <circle cx="256" cy="256" r="180" fill="none" stroke="#5b8cff" stroke-width="1" opacity="0.12"/>

  <!-- Herz, in Nordic-Blue gefüllt -->
  <path d="M 256 408 
           C 256 408, 92 304, 92 200
           C 92 144, 142 96, 198 96
           C 230 96, 256 118, 256 118
           C 256 118, 282 96, 314 96
           C 370 96, 420 144, 420 200
           C 420 304, 256 408, 256 408 Z"
        fill="url(#heartGrad)"/>

  <!-- EKG-Pulskurve, durchgehend horizontal, weiss mit leichtem Glow -->
  <path d="M 62 232 
           L 154 232 
           L 172 212 
           L 192 256 
           L 212 174 
           L 238 280 
           L 264 208 
           L 296 208
           L 314 184 
           L 334 232 
           L 356 232
           L 450 232"
        stroke="#ffffff" stroke-width="14" fill="none" 
        stroke-linecap="round" stroke-linejoin="round"
        filter="url(#glow)"/>

  <!-- Kleiner Aufwärtspfeil-Indikator unten rechts (zeigt Pulsanstieg beim Aufstehen) -->
  <g transform="translate(372, 360)">
    <circle r="36" fill="#1e2128" stroke="#5b8cff" stroke-width="3"/>
    <path d="M 0 -16 L -11 0 L -4 0 L -4 14 L 4 14 L 4 0 L 11 0 Z" fill="#5b8cff"/>
  </g>
</svg>
